<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Tracker — AI-901</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <div class="wrap">
    <a class="nav-badge" href="index.html">
      <div class="cert-icon">🤖</div>
      <span class="nav-title">AI-901 // Azure AI Fundamentals</span>
    </a>
    <div class="nav-links">
      <a href="objectives.html">Objectives</a>
      <a href="tracker.html" class="active">Tracker</a>
      <a href="flashcards.html">Flashcards</a>
      <a href="resources.html">Resources</a>
    </div>
  </div>
</nav>

<div class="wrap">

  <div class="page-header">
    <div class="hero-eyebrow">28 Topics · Saved Locally</div>
    <h1>Study <em>Progress Tracker</em></h1>
  </div>

  <section class="tracker-section">
    <div class="section-label">Click a topic to mark it as studied</div>
    <div class="tracker-grid" id="tracker-grid"></div>
    <div class="progress-summary">
      <span id="prog-text">0 / 0 topics studied</span>
      <div id="prog-bar-wrap"><div id="prog-bar"></div></div>
    </div>
  </section>

</div>

<script>
const topics = [
  "Responsible AI – Fairness",
  "Responsible AI – Reliability & Safety",
  "Responsible AI – Privacy & Security",
  "Responsible AI – Inclusiveness",
  "Responsible AI – Transparency",
  "Responsible AI – Accountability",
  "How Generative AI Models Work",
  "Model Selection by Capability",
  "Deployment Options & Config",
  "AI Workload Scenarios",
  "Text Analysis Techniques",
  "Speech Recognition & Synthesis",
  "Computer Vision Capabilities",
  "Information Extraction Techniques",
  "System & User Prompt Design",
  "Foundry Portal – Model Deployment",
  "Foundry SDK – Chat Client",
  "Single-Agent Solutions in Foundry",
  "Text Analysis App Build",
  "Multimodal Speech Prompts",
  "Azure Speech in Foundry Tools",
  "Multimodal Vision Prompts",
  "Generative Image Models",
  "Vision Capability App Build",
  "Azure Content Understanding – Docs",
  "Content Understanding – Images",
  "Content Understanding – Audio/Video",
  "Information Extraction App Build",
];

const saved = JSON.parse(localStorage.getItem('ai901-progress') || '[]');
const grid = document.getElementById('tracker-grid');

function saveProgress() {
  const state = [...grid.querySelectorAll('.tracker-item')].map(el => el.classList.contains('done'));
  localStorage.setItem('ai901-progress', JSON.stringify(state));
  updateBar();
}

function updateBar() {
  const items = grid.querySelectorAll('.tracker-item');
  const done = [...items].filter(el => el.classList.contains('done')).length;
  document.getElementById('prog-text').textContent = `${done} / ${items.length} topics studied`;
  document.getElementById('prog-bar').style.width = `${(done/items.length)*100}%`;
}

topics.forEach((t, i) => {
  const div = document.createElement('div');
  div.className = 'tracker-item' + (saved[i] ? ' done' : '');
  div.innerHTML = `<div class="check-box">${saved[i] ? '✓' : ''}</div><span class="tracker-label">${t}</span>`;
  div.onclick = () => {
    div.classList.toggle('done');
    const cb = div.querySelector('.check-box');
    cb.textContent = div.classList.contains('done') ? '✓' : '';
    saveProgress();
  };
  grid.appendChild(div);
});
updateBar();
</script>

</body>
</html>
