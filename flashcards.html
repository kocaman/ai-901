<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards — AI-901</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <div class="wrap">
    <a class="nav-badge" href="index.html">
      <div class="cert-icon">🤖</div>
      <span class="nav-title">AI-901 // Azure AI Fundamentals</span>
    </a>
    <div class="nav-links">
      <a href="objectives.html">Objectives</a>
      <a href="tracker.html">Tracker</a>
      <a href="flashcards.html" class="active">Flashcards</a>
      <a href="resources.html">Resources</a>
    </div>
  </div>
</nav>

<div class="wrap">

  <div class="page-header">
    <div class="hero-eyebrow">20 Cards · Click to Flip</div>
    <h1>Key Concept <em>Flashcards</em></h1>
  </div>

  <section class="flashcard-section">
    <div class="section-label">Key Concept Flashcards</div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="fc" onclick="flipCard()">
        <div class="fc-face fc-front">
          <div class="fc-label">Concept — click to flip</div>
          <div class="fc-text" id="fc-q"></div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-label">Answer</div>
          <div class="fc-text" id="fc-a"></div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn" onclick="prevCard()">← Prev</button>
      <button class="fc-btn primary" onclick="nextCard()">Next →</button>
      <span class="fc-counter" id="fc-counter">1 / 20</span>
    </div>
  </section>

</div>

<script>
const cards = [
  { q: "What are the 6 Microsoft Responsible AI principles?", a: "Fairness, Reliability & Safety, Privacy & Security, Inclusiveness, Transparency, and Accountability." },
  { q: "What is Microsoft Foundry?", a: "A unified portal and SDK for deploying AI models, building apps, creating agents, and managing prompts on Azure." },
  { q: "What percentage of the AI-901 exam covers Microsoft Foundry implementation?", a: "55–60% — the larger of the two exam domains." },
  { q: "What text analysis techniques should you know for AI-901?", a: "Keyword extraction, entity detection, sentiment analysis, and summarization." },
  { q: "What is a system prompt vs. a user prompt?", a: "A system prompt defines the AI's behavior and context; a user prompt is the runtime input from the end user." },
  { q: "What does Azure Content Understanding do?", a: "Extracts structured information from documents, forms, images, audio, and video using AI models in Foundry Tools." },
  { q: "What Python knowledge does AI-901 assume?", a: "Familiarity with Python coding syntax and programming techniques — enough to read and write lightweight app code." },
  { q: "What is a multimodal model?", a: "A model that can process multiple input types — e.g., text + images + audio — in a single inference call." },
  { q: "What is the passing score for AI-901?", a: "700 out of 1000." },
  { q: "When does AI-900 retire?", a: "June 30, 2026. AI-901 beta launched April 2026 and becomes GA in June 2026." },
  { q: "What is Retrieval-Augmented Generation (RAG)?", a: "A pattern where a generative model retrieves relevant documents from a knowledge store before generating a response, reducing hallucinations." },
  { q: "What is the Foundry SDK used for in AI-901?", a: "Building lightweight chat client applications and agent clients that interact with deployed models on Azure." },
  { q: "What workloads are covered under AI-901 AI Workloads?", a: "Generative AI, agentic AI, text analysis, speech, computer vision, and information extraction." },
  { q: "What does OCR stand for and which Azure service provides it?", a: "Optical Character Recognition — provided by Azure AI Vision for extracting text from images." },
  { q: "What is a single-agent solution in Foundry?", a: "An AI agent configured to autonomously plan and execute tasks using tools and a deployed model, without multi-agent orchestration." },
  { q: "Define model deployment configuration parameters.", a: "Settings like temperature, max tokens, top-p, and system prompt that control how a deployed model generates responses." },
  { q: "What is Azure AI Speech?", a: "An Azure service offering speech-to-text, text-to-speech, speech translation, and speaker recognition capabilities." },
  { q: "What is prompt engineering?", a: "The practice of crafting effective instructions and context in prompts to guide an AI model toward desired outputs." },
  { q: "What is the difference between supervised and unsupervised learning?", a: "Supervised uses labeled training data with known outputs; unsupervised finds patterns in unlabeled data without predefined categories." },
  { q: "What does 'responsible AI' mean in the context of AI-901?", a: "Building AI systems that are fair, safe, private, inclusive, transparent, and accountable — following Microsoft's AI principles." },
];

let idx = 0;
function render() {
  const c = cards[idx];
  document.getElementById('fc-q').textContent = c.q;
  document.getElementById('fc-a').textContent = c.a;
  document.getElementById('fc-counter').textContent = `${idx+1} / ${cards.length}`;
  document.getElementById('fc').classList.remove('flipped');
}
function flipCard() { document.getElementById('fc').classList.toggle('flipped'); }
function nextCard() { idx = (idx+1) % cards.length; render(); }
function prevCard() { idx = (idx - 1 + cards.length) % cards.length; render(); }
render();
</script>

</body>
</html>
